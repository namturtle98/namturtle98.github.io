<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팩트 체크 블로그</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    padding: 4rem 1rem 2rem;
    min-height: 100vh;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 3rem; }
  .site-title { font-size: 36px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .site-sub { font-size: 15px; color: #999; }
  .divider {
    height: 1px;
    background: #e8e8e4;
    margin-bottom: 2rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }
  .post-card {
    background: #fff;
    border: 1px solid #e8e8e4;
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.15s;
  }
  .post-card:hover { border-color: #bbb; }
  .post-badge {
    display: inline-block;
    background: #fde8e8;
    color: #a32d2d;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .post-title { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.4; }
  .post-desc { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 14px; }
  .post-footer { display: flex; justify-content: space-between; align-items: center; }
  .post-date { font-size: 12px; color: #bbb; }
  .post-arrow { font-size: 14px; color: #bbb; }
  .footer { text-align: center; margin-top: 3rem; font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="site-title">팩트 체크</div>
    <div class="site-sub">데이터로 보는 세상 — made with Claude</div>
  </div>

  <div class="divider"></div>

  <div class="grid">

    <a href="musk_bluff.html" class="post-card">
      <div class="post-badge">팩트 체크</div>
      <div class="post-title">일론 머스크의 뻥카 연대기</div>
      <div class="post-desc">사이버트럭, FSD, 화성... 말한 것과 실제 일어난 것의 차이를 데이터로 정리했다.</div>
      <div class="post-footer">
        <span class="post-date">2026년 3월</span>
        <span class="post-arrow">→</span>
      </div>
    </a>

    <a href="musk_terafab.html" class="post-card">
      <div class="post-badge">팩트 체크</div>
      <div class="post-title">머스크의 반도체 삽질 — Terafab</div>
      <div class="post-desc">연 2천억 개 칩 생산? 36조 원 투입? 반도체의 현실과 얼마나 다른지 짚어봤다.</div>
      <div class="post-footer">
        <span class="post-date">2026년 3월</span>
        <span class="post-arrow">→</span>
      </div>
    </a>

  </div>

  <div class="footer">made with Claude · 2026</div>

</div>
</body>
</html>
